services:
  db:
    image: postgres:16
    # 재부팅 무인 복귀(P6 결정 #40). ⚠️ 재부팅 시 dockerd는 depends_on을
    # 재평가하지 않는다 — backend가 db보다 먼저 뜨면 alembic 연결 실패로
    # 종료 → Docker 재시작 백오프로 수렴(최악 수 분, 의도된 회복 경로 —
    # P6 스펙 §10-2. 전제: dockerd가 OS 부팅 시 자동 시작(systemd enable)).
    restart: unless-stopped
    environment:
      POSTGRES_USER: ohmystock
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ohmystock}
      POSTGRES_DB: ohmystock
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ohmystock -d ohmystock"]
      interval: 3s
      timeout: 3s
      retries: 10
    ports:
      - "127.0.0.1:15432:5432"  # DB 도구(DBeaver 등) 접속용 — localhost 한정

  backend:
    build:
      context: ./backend
      target: app   # 다중 스테이지(리플레이 분리 — §4-2): 프로덕션 대상 명시
    restart: unless-stopped   # 재부팅 수렴 — db 서비스의 주석 참조(§10-2)
    env_file: .env
    extra_hosts:
      # 리눅스 네이티브 도커는 host.docker.internal을 기본 제공하지 않는다
      # (Phase 4 노트는 Windows Docker Desktop 기준 — 서버 이전으로 환경
      # 차이 실측 2026-07-22). 분석 파이프라인의 호스트 Ollama 연결에 필수.
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql+psycopg://ohmystock:${POSTGRES_PASSWORD:-ohmystock}@db:5432/ohmystock
      # LangSmith 텔레메트리 차단 — 활성화 시 프롬프트/응답(전략 기밀)이 외부 SaaS로 전송된다
      # (SDK가 인식하는 4개 이름 전부 고정 — 보안 패널 실측)
      LANGSMITH_TRACING_V2: "false"
      LANGCHAIN_TRACING_V2: "false"
      LANGSMITH_TRACING: "false"
      LANGCHAIN_TRACING: "false"
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # 리플레이 목 서버(스펙 §4-2) — `docker compose --profile replay up` 로만
  # 기동. 프로덕션 backend 이미지와 분리된 스테이지·진입점(uvicorn
  # replay.main). ⚠️ 무인증 관리 API(/_replay)가 있으므로 포트는 반드시
  # 루프백 바인딩(보안 패널 #3). 단일 워커 전제(계좌 상태 인메모리 —
  # replay/main.py 독스트링): 워커 옵션을 추가하지 말 것.
  replay:
    profiles: ["replay"]
    build:
      context: ./backend
      target: replay
    environment:
      # 필수값 — 미설정 시 컨테이너가 기동 즉시 fail-loud(ReplaySettings:
      # "REPLAY_ANCHOR is required"). compose 보간의 :?는 프로필 비활성
      # 상태의 기본 `docker compose up`까지 깨뜨려서 쓰지 않는다.
      REPLAY_ANCHOR: ${REPLAY_ANCHOR:-}
      REPLAY_SPEED: ${REPLAY_SPEED:-1.0}
      REPLAY_SYMBOLS: ${REPLAY_SYMBOLS:-}
      REPLAY_ETF_SYMBOLS: ${REPLAY_ETF_SYMBOLS:-}
    volumes:
      # 분봉 sqlite(281MB — dockerignore라 이미지에 미포함)는 읽기 전용 마운트
      - ./backend/replay/data:/app/replay/data:ro
    ports:
      - "127.0.0.1:9095:9095"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:9095/_replay/status', timeout=3)\""]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
